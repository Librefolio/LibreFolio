<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <link href="/favicon.png" rel="icon" type="image/png"/>
    <title>LibreFolio</title>
    <script>
        // Anti-FOUC: apply theme class before first paint.
        // Reads 'librefolio-theme' from localStorage (values: 'light' | 'dark' | '' for auto).
        (function () {
            var stored = '';
            try { stored = localStorage.getItem('librefolio-theme') || ''; } catch (e) {}
            var theme = stored === 'dark' ? 'dark'
                : stored === 'light' ? 'light'
                    : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.classList.add(theme);
            // Set splash background color based on theme
            var splash = document.getElementById('app-splash');
            if (splash) {
                splash.style.backgroundColor = theme === 'dark' ? '#0f172a' : '#f5f4ef';
                splash.querySelector('.splash-spinner').style.borderTopColor = theme === 'dark' ? '#86efac' : '#1a4031';
            }
        })();
    </script>
    <style>
        #app-splash {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background-color: #f5f4ef;
            transition: opacity 0.3s ease;
        }
        #app-splash.fade-out { opacity: 0; pointer-events: none; }
        .splash-logo { width: 80px; height: 80px; margin-bottom: 24px; }
        .splash-spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #1a4031;
            border-radius: 50%;
            animation: splash-spin 0.8s linear infinite;
        }
        @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
    %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
<div id="app-splash">
    <svg class="splash-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" fill="#1a4031"/>
        <text x="50" y="62" text-anchor="middle" font-size="36" font-weight="bold" fill="#f5f4ef" font-family="system-ui,sans-serif">LF</text>
    </svg>
    <div class="splash-spinner"></div>
</div>
<div style="display: contents">%sveltekit.body%</div>
</body>
</html>
