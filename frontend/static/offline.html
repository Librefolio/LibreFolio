<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LibreFolio — Offline</title>
    <style>
        /* === Theme Variables === */
        :root {
            --bg: #f5f4ef;
            --bg-dark: #11151c;
            --text: #1f2937;
            --text-muted: #6b7280;
            --accent: #1a4031;
            --accent-light: #9caf9c;
            --btn-bg: #1a4031;
            --btn-text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.3);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #11151c;
                --text: #f1f5f9;
                --text-muted: #94a3b8;
                --accent: #4ade80;
                --accent-light: #00ff9a;
                --btn-bg: #4ade80;
                --btn-text: #0f172a;
                --card-bg: rgba(30, 41, 59, 0.85);
                --card-border: rgba(51, 65, 85, 0.5);
                --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            }
        }

        /* === Base === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* === Animated Background (matching login page) === */
        .animated-bg {
            position: fixed;
            inset: 0;
            z-index: -10;
            background-color: var(--bg);
            overflow: hidden;
        }
        .wave {
            position: absolute;
            bottom: 0;
            left: -5%;
            width: 110%;
            height: 60%;
            background: linear-gradient(to top, var(--accent-light), transparent);
            transform-origin: bottom center;
        }
        .wave-1 {
            opacity: 0.25;
            animation: wave1 12s ease-in-out infinite;
            clip-path: polygon(0% 100%, 0% 60%, 15% 55%, 30% 65%, 45% 50%, 60% 60%, 75% 45%, 90% 55%, 100% 40%, 100% 100%);
        }
        .wave-2 {
            opacity: 0.18;
            animation: wave2 16s ease-in-out infinite;
            clip-path: polygon(0% 100%, 0% 70%, 20% 60%, 40% 70%, 60% 55%, 80% 65%, 100% 50%, 100% 100%);
        }
        .wave-3 {
            opacity: 0.12;
            animation: wave3 20s ease-in-out infinite;
            clip-path: polygon(0% 100%, 0% 55%, 25% 65%, 50% 50%, 75% 60%, 100% 45%, 100% 100%);
        }
        @keyframes wave1 {
            0%, 100% { transform: scaleY(1); }
            25% { transform: scaleY(1.15); }
            50% { transform: scaleY(0.9); }
            75% { transform: scaleY(1.1); }
        }
        @keyframes wave2 {
            0%, 100% { transform: scaleY(1); }
            33% { transform: scaleY(1.2); }
            66% { transform: scaleY(0.85); }
        }
        @keyframes wave3 {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.25); }
        }

        /* Chart lines */
        .chart-svg {
            position: absolute;
            bottom: 40%;
            left: 0;
            width: 100%;
            height: 30%;
        }
        .chart-line {
            opacity: 0;
            stroke: var(--accent);
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
        }
        .line-1 { animation: drawAndFade 12s ease-in-out infinite; }
        .line-2 { animation: drawAndFade 12s ease-in-out infinite; animation-delay: 4s; }
        .line-3 { animation: drawAndFade 12s ease-in-out infinite; animation-delay: 8s; }
        @keyframes drawAndFade {
            0% { stroke-dashoffset: 2000; opacity: 0; }
            5% { opacity: 0.15; }
            30% { stroke-dashoffset: 0; }
            55% { opacity: 0.15; }
            60% { stroke-dashoffset: -2000; opacity: 0; }
        }

        /* === Card (glassmorphism like login) === */
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 420px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: var(--card-shadow);
        }

        /* === Logo === */
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 16px;
            background: white;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (prefers-color-scheme: dark) {
            .logo { background: #1e293b; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); }
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        /* === Offline icon === */
        .icon-offline {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            color: var(--text-muted);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* === Typography === */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }
        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* === Button === */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.97); }

        /* === Status indicator === */
        .status {
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
    <script>
        // i18n
        const messages = {
            en: { title: 'Server Unreachable', body: 'LibreFolio cannot connect to the server. Check your network connection or try again later.', retry: 'Retry', status: 'Attempting to reconnect…' },
            it: { title: 'Server non raggiungibile', body: 'LibreFolio non riesce a connettersi al server. Controlla la connessione di rete o riprova più tardi.', retry: 'Riprova', status: 'Tentativo di riconnessione…' },
            fr: { title: 'Serveur inaccessible', body: 'LibreFolio ne peut pas se connecter au serveur. Vérifiez votre connexion réseau ou réessayez plus tard.', retry: 'Réessayer', status: 'Tentative de reconnexion…' },
            es: { title: 'Servidor inaccesible', body: 'LibreFolio no puede conectarse al servidor. Comprueba tu conexión de red o inténtalo más tarde.', retry: 'Reintentar', status: 'Intentando reconectar…' }
        };
        const lang = (navigator.language || 'en').slice(0, 2);
        const t = messages[lang] || messages.en;
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('title').textContent = t.title;
            document.getElementById('body').textContent = t.body;
            document.getElementById('retry-text').textContent = t.retry;
            document.getElementById('status-text').textContent = t.status;
        });
    </script>
</head>
<body>
    <!-- Animated Background (same as login page) -->
    <div class="animated-bg">
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
        <svg class="chart-svg" preserveAspectRatio="none" viewBox="0 0 1200 200">
            <path class="chart-line line-1" d="M0,150 L100,130 L200,140 L300,100 L400,120 L500,80 L600,90 L700,60 L800,70 L900,40 L1000,55 L1100,30 L1200,45" fill="none" stroke-width="2" />
            <path class="chart-line line-2" d="M0,120 L100,140 L200,100 L300,130 L400,90 L500,110 L600,70 L700,95 L800,55 L900,80 L1000,45 L1100,65 L1200,35" fill="none" stroke-width="2" />
            <path class="chart-line line-3" d="M0,140 L100,110 L200,130 L300,85 L400,115 L500,75 L600,100 L700,50 L800,85 L900,60 L1000,75 L1100,40 L1200,55" fill="none" stroke-width="2" />
        </svg>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="logo">
            <img src="/icons/icon-192.png" alt="LibreFolio" />
        </div>

        <!-- Offline icon (wifi-off) -->
        <svg class="icon-offline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="2" y1="2" x2="22" y2="22"/>
            <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
            <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
            <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
            <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
            <path d="M5 12.86a10 10 0 0 1 5.17-2.95"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>

        <h1 id="title">Server Unreachable</h1>
        <p id="body">LibreFolio cannot connect to the server. Check your network connection or try again later.</p>

        <button class="btn" onclick="location.reload()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span id="retry-text">Retry</span>
        </button>

        <div class="status">
            <span class="status-dot"></span>
            <span id="status-text">Attempting to reconnect…</span>
        </div>
    </div>

    <script>
        // Auto-retry every 10 seconds
        setInterval(() => {
            fetch('/', { method: 'HEAD', cache: 'no-store' })
                .then((r) => { if (r.ok) location.reload(); })
                .catch(() => {});
        }, 10000);
    </script>
</body>
</html>
